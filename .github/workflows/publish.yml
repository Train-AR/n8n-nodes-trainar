name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishers OIDC + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'  # ships with npm 11+ for native Trusted Publisher OIDC
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (publish-strict)
        run: npm run lint

      - name: Publish to npm
        run: npm publish --provenance --access public
