name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishers OIDC + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Strip placeholder auth token (let OIDC handle Trusted Publisher)
        run: |
          # setup-node always writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # to the user .npmrc. When NODE_AUTH_TOKEN is unset, this becomes an empty
          # token that blocks the OIDC fallback. Strip it so npm uses the GH Actions
          # OIDC token via the Trusted Publisher binding instead.
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" || true
          echo "--- .npmrc after strip ---"
          cat "$NPM_CONFIG_USERCONFIG" || true
          echo "--- end ---"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (publish-strict)
        run: npm run lint

      - name: Publish to npm
        run: npm publish --provenance --access public
